name: build-android

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_env:
        description: setup.dart build environment
        required: true
        default: stable
        type: choice
        options:
          - stable
          - pre

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve Build Env
        shell: bash
        run: |
          build_env="${{ github.event.inputs.build_env }}"
          if [ -z "$build_env" ]; then
            build_env="stable"
          fi
          echo "BUILD_ENV=$build_env" >> "$GITHUB_ENV"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: |
          set +e
          yes 2>/dev/null | sdkmanager --licenses > /dev/null
          sdk_statuses=("${PIPESTATUS[@]}")
          set -e

          license_status="${sdk_statuses[1]:-0}"

          if [ "$license_status" -ne 0 ]; then
            echo "sdkmanager --licenses failed with exit code: $license_status" >&2
            exit "$license_status"
          fi

          sdkmanager --install "ndk;28.0.13004108"
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/28.0.13004108" >> "$GITHUB_ENV"

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Setup Android Signing
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ] || [ -z "$KEY_ALIAS" ] || [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Android signing secrets are not fully configured; skip release keystore injection."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 --decode > android/app/keystore.jks
          {
            echo "keyAlias=$KEY_ALIAS"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
          } >> android/local.properties

      - name: Override google-services.json
        shell: bash
        env:
          SERVICE_JSON_B64: ${{ secrets.SERVICE_JSON }}
        run: |
          if [ -z "$SERVICE_JSON_B64" ]; then
            echo "SERVICE_JSON secret is empty; keep repository google-services.json."
            exit 0
          fi
          echo "$SERVICE_JSON_B64" | base64 --decode > android/app/google-services.json

      - name: Get Flutter Dependencies
        run: |
          flutter --version
          flutter pub get

      - name: Build Android Packages
        run: dart setup.dart android --env $BUILD_ENV

      - name: Collect Artifacts
        shell: bash
        run: |
          dist_dir="$PWD/dist"
          artifact_dir="$PWD/artifacts/android"
          fallback_dirs=(
            "$PWD/build/app/outputs/flutter-apk"
            "$PWD/build/app/outputs/apk"
            "$PWD/build/app/outputs/bundle"
          )

          mkdir -p "$artifact_dir"

          if [ -d "$dist_dir" ] && find "$dist_dir" -type f -print -quit | grep -q .; then
            cp -R "$dist_dir"/. "$artifact_dir"/
            exit 0
          fi

          for dir in "${fallback_dirs[@]}"; do
            if [ -d "$dir" ] && find "$dir" -type f -print -quit | grep -q .; then
              cp -R "$dir"/. "$artifact_dir"/
              exit 0
            fi
          done

          echo "dist snapshot:" >&2
          if [ -d "$dist_dir" ]; then
            find "$dist_dir" -maxdepth 4 -print >&2
          else
            echo "dist directory missing" >&2
          fi

          for dir in "${fallback_dirs[@]}"; do
            echo "snapshot: $dir" >&2
            if [ -d "$dir" ]; then
              find "$dir" -maxdepth 4 -print >&2
            else
              echo "directory missing" >&2
            fi
          done

          echo "No Android artifacts were found in dist or build outputs." >&2
          exit 1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact-android
          path: ./artifacts/android
          if-no-files-found: error
          overwrite: true
