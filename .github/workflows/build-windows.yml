name: build-windows

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_env:
        description: setup.dart build environment
        required: true
        default: pre
        type: choice
        options:
          - pre
          - stable
      arch:
        description: Windows target architecture
        required: true
        default: amd64
        type: choice
        options:
          - amd64
          - arm64

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve Build Options
        shell: pwsh
        run: |
          $buildEnv = "${{ github.event.inputs.build_env }}"
          if ([string]::IsNullOrWhiteSpace($buildEnv)) {
            $buildEnv = "pre"
          }
          "BUILD_ENV=$buildEnv" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $buildArch = "${{ github.event.inputs.arch }}"
          if ([string]::IsNullOrWhiteSpace($buildArch)) {
            $buildArch = "amd64"
          }
          "BUILD_ARCH=$buildArch" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/helper

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Get Flutter Dependencies
        shell: pwsh
        run: |
          flutter --version
          flutter pub get

      - name: Build Windows Packages
        shell: pwsh
        run: dart setup.dart windows --arch $env:BUILD_ARCH --env $env:BUILD_ENV

      - name: Collect Artifacts
        shell: pwsh
        run: |
          $distDir = Join-Path $PWD "dist"
          $artifactDir = Join-Path $PWD "artifacts/windows"
          $releaseRoot = Join-Path $PWD "build/windows"

          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $distFiles = @()
          if (Test-Path $distDir) {
            $distFiles = Get-ChildItem -Path $distDir -Recurse -File
          }

          if ($distFiles.Count -gt 0) {
            Copy-Item -Path (Join-Path $distDir "*") -Destination $artifactDir -Recurse -Force
            exit 0
          }

          $releaseDirs = @()
          if (Test-Path $releaseRoot) {
            $releaseDirs = Get-ChildItem -Path $releaseRoot -Directory -Recurse |
              Where-Object { $_.Name -eq "Release" }
          }

          if ($releaseDirs.Count -gt 0) {
            foreach ($dir in $releaseDirs) {
              $relative = $dir.FullName.Substring($releaseRoot.Length).TrimStart('\')
              $safeName = $relative -replace '[\\/:*?"<>|]', '_'
              $target = Join-Path $artifactDir $safeName
              Copy-Item -Path $dir.FullName -Destination $target -Recurse -Force
            }
            exit 0
          }

          Write-Host "dist snapshot:"
          if (Test-Path $distDir) {
            Get-ChildItem -Path $distDir -Recurse -Force
          } else {
            Write-Host "dist directory missing"
          }

          Write-Host "build/windows snapshot:"
          if (Test-Path $releaseRoot) {
            Get-ChildItem -Path $releaseRoot -Recurse -Force
          } else {
            Write-Host "build/windows directory missing"
          }

          throw "No Windows artifacts were found in dist or build/windows."

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact-windows
          path: ./artifacts/windows
          if-no-files-found: error
          overwrite: true
